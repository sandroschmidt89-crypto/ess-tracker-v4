<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>EssTracker V4.1</title><link rel='stylesheet' href='style.css'></head><body><header><h1>🍽️ EssTracker V4.1</h1></header><nav><button onclick="showTab('dashboard')">🏠 Dashboard</button><button onclick="showTab('meal')">🍽️ Mahlzeit</button><button onclick="showTab('weight')">⚖️ Gewicht</button><button onclick="showTab('analysis')">📊 Analyse</button></nav><section id='dashboard' class='tab'></section><section id='meal' class='tab hidden'><h2>Mahlzeit erfassen</h2><textarea id='food'></textarea><label>Hunger</label><select id='hunger'></select><label>Sättigung</label><select id='satiety'></select><label>Stimmung</label><select id='mood'><option>😊 Gut</option><option>😐 Neutral</option><option>😤 Gestresst</option><option>😔 Schlecht</option></select><label>Heißhunger</label><select id='craving'><option value='false'>Nein</option><option value='true'>Ja</option></select><label>Genuss</label><select id='enjoyment'></select><label>Gesundheit</label><select id='health'></select><label>Portionsgefühl</label><select id='portion'></select><button onclick='saveMeal()'>Speichern</button><button onclick='clearMealForm()'>Felder leeren</button><h3>Mahlzeiten nach Tagen</h3><div id='mealGroups'></div></section><section id='weight' class='tab hidden'><input id='weightInput' type='number' step='0.1'><button onclick='saveWeight()'>Speichern</button><div id='weightList'></div></section><section id='analysis' class='tab hidden'><div id='analysisContent'></div></section><script src='app.js'></script></body></html>
