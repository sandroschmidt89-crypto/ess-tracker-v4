<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EssTracker V4 Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>🍽️ EssTracker V4 Pro</h1></header>

<nav>
<button onclick="showTab('dashboard')">🏠 Dashboard</button>
<button onclick="showTab('meal')">🍽️ Mahlzeit</button>
<button onclick="showTab('weight')">⚖️ Gewicht</button>
<button onclick="showTab('analysis')">📊 Analyse</button>
<button onclick="showTab('settings')">⚙️</button>
</nav>

<main>
<section id="dashboard" class="tab"></section>

<section id="meal" class="tab hidden">
<h2>Mahlzeit erfassen</h2>
<textarea id="food" placeholder="Was gab es?"></textarea>
<label>Hunger</label><input id="hunger" type="range" min="1" max="10" step="0.5" value="5">
<label>Sättigung</label><input id="satiety" type="range" min="1" max="10" step="0.5" value="7">
<select id="mood">
<option>😊 Gut</option><option>😐 Neutral</option>
<option>😤 Gestresst</option><option>😔 Schlecht</option>
</select>
<label><input type="checkbox" id="craving"> Heißhunger</label>
<input id="enjoyment" type="number" min="1" max="10" placeholder="Genuss">
<input id="health" type="number" min="1" max="10" placeholder="Gesundheit">
<input id="portion" type="number" min="1" max="10" placeholder="Portionsgefühl">
<button onclick="saveMeal()">Speichern</button>
<h3>Einträge</h3>
<div id="mealList"></div>
</section>

<section id="weight" class="tab hidden">
<h2>Gewicht</h2>
<input id="weightInput" type="number" step="0.1" placeholder="Gewicht">
<button onclick="saveWeight()">Speichern</button>
<div id="weightList"></div>
</section>

<section id="analysis" class="tab hidden">
<h2>Analyse</h2>
<div id="analysisContent"></div>
</section>

<section id="settings" class="tab hidden">
<h2>Backup</h2>
<button onclick="exportData()">Exportieren</button>
<input type="file" id="importFile">
<button onclick="importData()">Importieren</button>
<button onclick="resetData()">Alle Daten löschen</button>
</section>
</main>
<script src="app.js"></script>
</body></html>
