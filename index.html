<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EssTracker V4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>🍽️ EssTracker V4</h1>

<section class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</section>

<section class="card">
<h2>Gewicht</h2>
<input id="weight" type="number" step="0.1" placeholder="115.0">
<button onclick="saveWeight()">Speichern</button>
</section>

<section class="card">
<h2>Mahlzeit erfassen</h2>
<textarea id="food" placeholder="Was gab es?"></textarea>
<input id="hunger" type="range" min="1" max="10" step="0.5" value="5">
<label>Hunger</label>
<input id="satiety" type="range" min="1" max="10" step="0.5" value="7">
<label>Sättigung</label>
<select id="mood">
<option>😊 Gut</option>
<option>😐 Neutral</option>
<option>😤 Gestresst</option>
<option>😔 Schlecht</option>
</select>
<label><input type="checkbox" id="craving"> Heißhunger</label>
<button onclick="saveMeal()">Mahlzeit speichern</button>
</section>

<section class="card">
<h2>Backup</h2>
<button onclick="exportData()">Exportieren</button>
<input type="file" id="importFile">
<button onclick="importData()">Importieren</button>
</section>

<section class="card">
<h2>Mahlzeiten</h2>
<div id="meals"></div>
</section>
</div>
<script src="app.js"></script>
</body>
</html>
